<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZHAO · 常来长安</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:   #8C1414;
      --red-m: #B01818;
      --red-l: #D42020;
      --warm:  #FDF8F2;
      --ink:   #1a0505;
      --muted: rgba(140,20,20,0.38);
      --serif: 'Noto Serif SC', 'STSong', '宋体', serif;
    }

    html, body {
      height: 100%; overflow: hidden;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--red);
    }

    .root { display: flex; height: 100vh; width: 100vw; }

    /* ═══ LEFT BRAND ═══ */
    .brand {
      flex: 0 0 54%; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(155deg, #b01a1a 0%, #8C1414 45%, #6a0f0f 100%);
    }
    .brand::after {
      content: ''; position: absolute; top: 0; right: 0; bottom: 0; width: 1px; z-index: 10;
      background: linear-gradient(180deg,
        transparent 0%, rgba(255,255,255,0.45) 15%,
        rgba(255,255,255,0.75) 50%, rgba(255,255,255,0.45) 85%, transparent 100%);
    }
    .bg-liao {
      position: absolute; height: 50%; width: auto;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      opacity: 0.16; pointer-events: none; z-index: 1;
      animation: liaoBreath 10s ease-in-out infinite alternate;
    }
    @keyframes liaoBreath {
      from { opacity: 0.13; transform: translate(-50%,-50%) scale(1); }
      to   { opacity: 0.20; transform: translate(-50%,-50%) scale(1.03); }
    }
    .b-center { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }
    .b-logo-img { width: min(300px,58%); height: auto; filter: drop-shadow(0 4px 24px rgba(0,0,0,0.35)); }
    .b-since { display: flex; align-items: center; gap: 14px; margin-top: 28px; }
    .since-dash { width: 40px; height: 1px; background: rgba(255,255,255,0.50); }
    .since-text { font-family: var(--serif); font-size: 13px; font-weight: 600; letter-spacing: 0.30em; color: rgba(255,255,255,0.70); white-space: nowrap; }

    /* ═══ RIGHT PANEL ═══ */
    .form-side {
      flex: 1; background: var(--warm);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow-y: auto; gap: 8px; padding: 12px 0;
    }

    /* Typewriter */
    .type-head { height: 38px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .type-text { font-family: var(--serif); font-size: 22px; font-weight: 700; color: var(--red); letter-spacing: 0.20em; }
    .type-cursor {
      display: inline-block; width: 2px; height: 24px;
      background: var(--red); vertical-align: middle; margin-left: 3px; border-radius: 1px;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink { 0%,100%{ opacity:1 } 50%{ opacity:0 } }

    /* ═══ LANTERN ═══
       Container sized to fill the right panel generously.
       SVG viewBox "0 0 340 600" scales proportionally inside.
       Form content uses % so it scales with the container.
    ═══ */
    .lantern-form {
      position: relative;
      /* Fill most of the available height, keep aspect ratio 340:600 */
      height: min(850px, calc(100vh - 70px));
      width:  calc(min(850px, calc(100vh - 70px)) * 340 / 600);
      flex-shrink: 0;
      animation: riseIn 0.9s cubic-bezier(0.22,1,0.36,1) both 0.05s;
    }
    @keyframes riseIn { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:none; } }

    .ln-svg { position: absolute; inset: 0; width: 100%; height: 100%; }

    /*
      SVG body rect: x=42 y=52 width=256 height=370 rx=24 (in viewBox coords 340×600)
      Mapped to % of container (width=340vb, height=600vb):
        body-left   = 42/340  = 12.35%
        body-top    = 52/600  = 8.67%
        body-right  = (340-298)/340 = 12.35%
        body-bottom = (600-422)/600 = 29.67%
      Add a bit of padding inside the body for the caps & rounded corners:
        content-top    ≈ 90/600 = 15%
        content-bottom ≈ 185/600 = 30.8% → 31%
        content-left   ≈ 65/340 = 19.1% → 19%
        content-right  ≈ 65/340 = 19.1% → 19%
    */
    .ln-content {
      position: absolute;
      top: 15%; bottom: 31%; left: 19%; right: 19%;
      overflow-y: auto; overflow-x: hidden;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .ln-content::-webkit-scrollbar { display: none; }

    /* ── Tabs ── */
    .tabs {
      display: flex; margin-bottom: 20px;
      border-bottom: 1px solid rgba(140,20,20,0.13);
    }
    .tab {
      flex: 1; padding: 4px 0 10px;
      background: none; border: none; cursor: pointer;
      font-family: var(--serif); font-size: 14px; font-weight: 600;
      color: rgba(140,20,20,0.28); letter-spacing: 0.25em;
      position: relative; transition: color 0.25s;
    }
    .tab::after {
      content: ''; position: absolute;
      bottom: -1px; left: 16%; right: 16%; height: 2px;
      background: var(--red); border-radius: 1px;
      transform: scaleX(0); transition: transform 0.30s cubic-bezier(0.22,1,0.36,1);
    }
    .tab.active { color: var(--red); }
    .tab.active::after { transform: scaleX(1); }

    /* ── Panels ── */
    .panel { display: none; }
    .panel.active { display: block; animation: fadeUp 0.28s ease both; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(7px); } to { opacity:1; transform:none; } }

    /* ── Fields — clean underline style ── */
    .field { margin-bottom: 22px; }
    .field label {
      display: block; font-family: var(--serif); font-size: 11px; font-weight: 600;
      letter-spacing: 0.28em; color: rgba(140,20,20,0.42); margin-bottom: 9px;
      text-transform: uppercase;
    }
    .pw-wrap { position: relative; }
    .field input {
      display: block; width: 100%;
      padding: 8px 28px 10px 0;
      background: transparent; border: none;
      border-bottom: 1.5px solid rgba(140,20,20,0.18);
      color: var(--ink); font-family: var(--serif); font-size: 15px;
      outline: none; transition: border-color 0.25s;
    }
    .field input::placeholder { color: rgba(140,20,20,0.20); font-size: 14px; font-family: var(--serif); }
    .field input:focus { border-bottom-color: var(--red); }
    .pw-btn {
      position: absolute; right: 0; top: 50%; transform: translateY(-60%);
      background: none; border: none; cursor: pointer;
      color: rgba(140,20,20,0.25); font-size: 14px;
      transition: color 0.2s; line-height: 1; padding: 0;
    }
    .pw-btn:hover { color: var(--red); }

    /* Strength bar */
    .str { display: flex; gap: 4px; margin-top: 8px; }
    .str-s { height: 2.5px; flex: 1; border-radius: 1px; background: rgba(140,20,20,0.09); transition: background 0.3s; }
    .str-s.w { background: #c43030; }
    .str-s.m { background: #c09020; }
    .str-s.s { background: #3a8a55; }

    /* Meta row */
    .meta { display: flex; justify-content: space-between; align-items: center; margin: 2px 0 22px; }
    .chk { display: flex; gap: 6px; align-items: center; cursor: pointer; font-family: var(--serif); font-size: 12px; color: var(--muted); }
    .chk input { accent-color: var(--red); width: 12px; height: 12px; cursor: pointer; }
    .forgot { font-family: var(--serif); font-size: 12px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .forgot:hover { color: var(--red); }

    /* ── Button ── */
    .btn {
      width: 100%; padding: 13px;
      border: none; border-radius: 2px; cursor: pointer;
      font-family: var(--serif); font-size: 15px; font-weight: 700;
      letter-spacing: 0.55em; text-indent: 0.55em;
      color: #fff; background: var(--red);
      position: relative; overflow: hidden;
      box-shadow: 0 4px 20px rgba(140,20,20,0.28);
      transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    }
    .btn::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.22); }
    .btn::after {
      content: ''; position: absolute;
      top: 0; left: -120%; width: 55%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.13), transparent);
      transform: skewX(-20deg); transition: left 0.55s;
    }
    .btn:hover { background: var(--red-m); transform: translateY(-1px); box-shadow: 0 8px 26px rgba(140,20,20,0.36); }
    .btn:hover::after { left: 160%; }
    .btn:active { transform: translateY(1px); }
    .btn.loading { pointer-events: none; }
    .btn .spin { display: none; width: 16px; height: 16px; margin: 0 auto; border: 2px solid rgba(255,255,255,0.28); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    .btn.loading .lbl { display: none; }
    .btn.loading .spin { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Terms */
    .terms { font-family: var(--serif); font-size: 11px; color: var(--muted); text-align: center; margin-top: 14px; line-height: 1.8; }
    .terms a { color: var(--red); text-decoration: none; opacity: 0.65; }
    .terms a:hover { opacity: 1; }

    /* Error */
    .err { font-family: var(--serif); font-size: 11px; color: var(--red-l); margin-top: 5px; display: none; }
    .field.has-err input { border-bottom-color: var(--red-l); }
    .field.has-err .err { display: block; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--red); border-radius: 3px; padding: 11px 22px;
      font-family: var(--serif); font-size: 13px; letter-spacing: 0.06em;
      color: #fff; white-space: nowrap;
      box-shadow: 0 6px 28px rgba(140,20,20,0.40);
      transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.4s;
      opacity: 0; z-index: 999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.ok   { background: #2d7a4a; }

    @media (max-width: 800px) { .brand { display: none; } }
  </style>
</head>
<body>

<div class="root">

  <!-- ══ LEFT ══ -->
  <div class="brand">
    <img class="bg-liao" aria-hidden="true"
      src="public/ZHAO-元素element/文字/白色字体/未标题-3-18.png" alt="" />
    <div class="b-center">
      <img class="b-logo-img" src="public/ZHAO-元素element/logo/2-01.png" alt="ZHAO" />
      <div class="b-since">
        <div class="since-dash"></div>
        <span class="since-text">Since 2011</span>
        <div class="since-dash"></div>
      </div>
    </div>
  </div>

  <!-- ══ RIGHT ══ -->
  <div class="form-side">

    <div class="type-head">
      <span class="type-text" id="tw-text"></span><span class="type-cursor"></span>
    </div>

    <!-- LANTERN -->
    <div class="lantern-form">

      <!--
        SVG viewBox 340×600. Body rect: x=42 y=52 w=256 h=370 rx=24.
        Body bottom at y=422. Bottom cap y=420–450. Connector y=450–494. Tassel y=494–580.
      -->
      <svg class="ln-svg" viewBox="0 0 340 600" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <clipPath id="bodyClip">
            <rect x="42" y="52" width="256" height="370" rx="24"/>
          </clipPath>
          <radialGradient id="bodyGlow" cx="50%" cy="28%" r="65%">
            <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.22"/>
            <stop offset="100%" stop-color="#FDF8F2" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- Hanging string -->
        <line x1="170" y1="0" x2="170" y2="26" stroke="#8C1414" stroke-width="1.5"/>

        <!-- Knob -->
        <circle cx="170" cy="10" r="10"  fill="#8C1414"/>
        <circle cx="170" cy="10" r="6"   fill="#a52020"/>
        <circle cx="170" cy="10" r="2.5" fill="rgba(255,200,120,0.55)"/>

        <!-- Top cap -->
        <rect x="46" y="24" width="248" height="30" rx="7" fill="#8C1414"/>
        <rect x="46" y="24" width="248" height="7"  rx="7" fill="rgba(255,215,120,0.18)"/>
        <line x1="53" y1="53" x2="287" y2="53" stroke="rgba(201,160,32,0.72)" stroke-width="1.5"/>

        <!-- Body -->
        <rect x="42" y="52" width="256" height="370" rx="24" fill="#FDF8F2"/>
        <rect x="42" y="52" width="256" height="370" rx="24" fill="url(#bodyGlow)" clip-path="url(#bodyClip)"/>

        <!-- Vertical ribs -->
        <g clip-path="url(#bodyClip)" opacity="0.085">
          <line x1="76"  y1="52" x2="76"  y2="422" stroke="#8C1414" stroke-width="1.2"/>
          <line x1="103" y1="52" x2="103" y2="422" stroke="#8C1414" stroke-width="1.2"/>
          <line x1="130" y1="52" x2="130" y2="422" stroke="#8C1414" stroke-width="1.2"/>
          <line x1="170" y1="52" x2="170" y2="422" stroke="#8C1414" stroke-width="1.2"/>
          <line x1="210" y1="52" x2="210" y2="422" stroke="#8C1414" stroke-width="1.2"/>
          <line x1="237" y1="52" x2="237" y2="422" stroke="#8C1414" stroke-width="1.2"/>
          <line x1="264" y1="52" x2="264" y2="422" stroke="#8C1414" stroke-width="1.2"/>
        </g>

        <!-- Gold horizontal rings -->
        <g clip-path="url(#bodyClip)">
          <line x1="0" y1="114" x2="340" y2="114" stroke="rgba(201,160,32,0.52)" stroke-width="1.5"/>
          <line x1="0" y1="362" x2="340" y2="362" stroke="rgba(201,160,32,0.52)" stroke-width="1.5"/>
        </g>

        <!-- Body border -->
        <rect x="42" y="52" width="256" height="370" rx="24" stroke="#8C1414" stroke-width="2" fill="none"/>

        <!-- Gold edge above bottom cap -->
        <line x1="48" y1="420" x2="292" y2="420" stroke="rgba(201,160,32,0.72)" stroke-width="1.5"/>

        <!-- Bottom cap -->
        <rect x="46" y="420" width="248" height="30" rx="7" fill="#8C1414"/>
        <rect x="46" y="443" width="248" height="7"  rx="7" fill="rgba(255,215,120,0.14)"/>

        <!-- Tassel connector block -->
        <rect x="135" y="450" width="70" height="44" rx="8" fill="#8C1414"/>
        <line x1="142" y1="459" x2="198" y2="459" stroke="rgba(255,215,120,0.38)" stroke-width="1"/>
        <line x1="142" y1="466" x2="198" y2="466" stroke="rgba(255,215,120,0.38)" stroke-width="1"/>
        <line x1="142" y1="473" x2="198" y2="473" stroke="rgba(255,215,120,0.38)" stroke-width="1"/>
        <line x1="142" y1="480" x2="198" y2="480" stroke="rgba(255,215,120,0.38)" stroke-width="1"/>
        <line x1="142" y1="487" x2="198" y2="487" stroke="rgba(255,215,120,0.38)" stroke-width="1"/>

        <!-- Tassel fringe (13 strings) -->
        <g stroke="#8C1414" stroke-width="1.1" stroke-linecap="round" opacity="0.75">
          <line x1="138" y1="494" x2="126" y2="578"/>
          <line x1="143" y1="494" x2="134" y2="578"/>
          <line x1="149" y1="494" x2="143" y2="578"/>
          <line x1="155" y1="494" x2="152" y2="578"/>
          <line x1="161" y1="494" x2="161" y2="578"/>
          <line x1="165" y1="494" x2="165" y2="578"/>
          <line x1="170" y1="494" x2="170" y2="578"/>
          <line x1="175" y1="494" x2="175" y2="578"/>
          <line x1="179" y1="494" x2="179" y2="578"/>
          <line x1="185" y1="494" x2="188" y2="578"/>
          <line x1="191" y1="494" x2="197" y2="578"/>
          <line x1="197" y1="494" x2="206" y2="578"/>
          <line x1="202" y1="494" x2="214" y2="578"/>
        </g>
      </svg>

      <!-- Form content (% positioning scales with lantern size) -->
      <div class="ln-content">

        <div class="tabs" role="tablist">
          <button class="tab active" id="t-login"    onclick="sw('login')">登　入</button>
          <button class="tab"        id="t-register" onclick="sw('register')">注　册</button>
        </div>

        <!-- LOGIN -->
        <div class="panel active" id="p-login">
          <form onsubmit="doLogin(event)" novalidate>

            <div class="field" id="f-le">
              <label>账　号</label>
              <input type="text" id="le" placeholder="邮箱或账号" autocomplete="username"/>
              <div class="err">请输入有效的邮箱地址</div>
            </div>

            <div class="field" id="f-lp">
              <label>密　码</label>
              <div class="pw-wrap">
                <input type="password" id="lp" placeholder="请输入密码" autocomplete="current-password"/>
                <button type="button" class="pw-btn" onclick="tpw('lp',this)" tabindex="-1">👁</button>
              </div>
              <div class="err">密码不能为空</div>
            </div>

            <div class="meta">
              <label class="chk"><input type="checkbox"/> 记住设备</label>
              <a href="#" class="forgot">忘记密码？</a>
            </div>

            <button type="submit" class="btn" id="btn-login">
              <div class="spin"></div><span class="lbl">进　入</span>
            </button>

          </form>
        </div>

        <!-- REGISTER -->
        <div class="panel" id="p-register">
          <form onsubmit="doReg(event)" novalidate>

            <div class="field" id="f-rn">
              <label>姓　名</label>
              <input type="text" id="rn" placeholder="您的姓名" autocomplete="name"/>
              <div class="err">请输入您的姓名</div>
            </div>

            <div class="field" id="f-re">
              <label>邮　箱</label>
              <input type="email" id="re" placeholder="your@email.com" autocomplete="email"/>
              <div class="err">请输入有效的邮箱地址</div>
            </div>

            <div class="field" id="f-rp">
              <label>密　码</label>
              <div class="pw-wrap">
                <input type="password" id="rp" placeholder="至少 8 位"
                  autocomplete="new-password" oninput="chkStr(this.value)"/>
                <button type="button" class="pw-btn" onclick="tpw('rp',this)" tabindex="-1">👁</button>
              </div>
              <div class="str">
                <div class="str-s" id="s1"></div>
                <div class="str-s" id="s2"></div>
                <div class="str-s" id="s3"></div>
                <div class="str-s" id="s4"></div>
              </div>
              <div class="err">密码至少需要 8 位</div>
            </div>

            <button type="submit" class="btn" id="btn-reg" style="margin-top:8px">
              <div class="spin"></div><span class="lbl">立即注册</span>
            </button>

            <div class="terms">
              注册即同意 <a href="#">《服务条款》</a> 与 <a href="#">《隐私政策》</a>
            </div>

          </form>
        </div>

      </div><!-- .ln-content -->
    </div><!-- .lantern-form -->

  </div><!-- .form-side -->
</div><!-- .root -->

<div class="toast" id="toast"></div>

<script>
(function(){
  const el = document.getElementById('tw-text');
  const phrases = ['欢 迎 归 来', 'ZHAO\'s Family', 'Bienvenue', '100% Chinese'];
  let pi=0, ci=0, del=false;
  const TYPE=130, DEL=65, PAUSE=2200;
  function tick(){
    const p = phrases[pi];
    if(!del){
      ci++; el.textContent = p.slice(0, ci);
      if(ci >= p.length){ del=true; setTimeout(tick, PAUSE); return; }
    } else {
      ci--; el.textContent = p.slice(0, ci);
      if(ci === 0){ del=false; pi=(pi+1)%phrases.length; }
    }
    setTimeout(tick, del ? DEL : TYPE);
  }
  tick();
})();

function sw(n){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('t-'+n).classList.add('active');
  document.getElementById('p-'+n).classList.add('active');
}

function tpw(id, btn){
  const i = document.getElementById(id);
  i.type = i.type === 'password' ? 'text' : 'password';
  btn.textContent = i.type === 'password' ? '👀' : '🙈';
}

function chkStr(v){
  let s=0;
  if(v.length>=8)s++; if(/[A-Z]/.test(v))s++; if(/[0-9]/.test(v))s++; if(/[^A-Za-z0-9]/.test(v))s++;
  const c=['','w','m','m','s'];
  ['s1','s2','s3','s4'].forEach((id,i)=>{
    const el=document.getElementById(id); el.className='str-s'; if(i<s) el.classList.add(c[s]);
  });
}

function setErr(id, msg, show){
  const f = document.getElementById(id);
  if(show){ f.classList.add('has-err'); if(msg) f.querySelector('.err').textContent=msg; }
  else f.classList.remove('has-err');
}
const isEmail = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);

function fake(bid, cb){
  const b = document.getElementById(bid);
  b.classList.add('loading');
  setTimeout(()=>{ b.classList.remove('loading'); cb(); }, 1400);
}

let tt;
function toast(msg, type=''){
  const el = document.getElementById('toast');
  el.textContent=msg; el.className='toast '+type+' show';
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('show'), 3400);
}

function doLogin(e){
  e.preventDefault();
  const em=document.getElementById('le').value.trim();
  const pw=document.getElementById('lp').value;
  let ok=true;
  const emErr=!em||!isEmail(em);
  setErr('f-le','请输入有效的邮箱地址',emErr); if(emErr) ok=false;
  setErr('f-lp','密码不能为空',!pw);            if(!pw)   ok=false;
  if(!ok) return;
  fake('btn-login',()=>toast('✦ 登入成功，常来长安','ok'));
}

function doReg(e){
  e.preventDefault();
  const nm=document.getElementById('rn').value.trim();
  const em=document.getElementById('re').value.trim();
  const pw=document.getElementById('rp').value;
  let ok=true;
  setErr('f-rn','请输入您的姓名',!nm);                         if(!nm)              ok=false;
  setErr('f-re','请输入有效的邮箱地址',!em||!isEmail(em));      if(!em||!isEmail(em)) ok=false;
  setErr('f-rp','密码至少需要 8 位',pw.length<8);               if(pw.length<8)      ok=false;
  if(!ok) return;
  fake('btn-reg',()=>{ toast('✦ 账号已创建，请查收验证邮件','ok'); setTimeout(()=>sw('login'),1000); });
}
</script>
</body>
</html>
