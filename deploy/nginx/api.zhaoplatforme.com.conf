# Nginx reverse proxy for the backend.
# Public:  https://api.zhaoplatforme.com/backend3/<route>
# Upstream: backend container published on 127.0.0.1:3002 by docker-compose.prod.yml
#
# The trailing slash on proxy_pass strips the /backend3 prefix, so the backend
# is reached at the root (keep API_PREFIX empty in apps/backend/.env.production).
# Obtain the TLS cert with: certbot --nginx -d api.zhaoplatforme.com
#
# Install: copy to /etc/nginx/sites-available/, symlink into sites-enabled/,
# then `nginx -t && systemctl reload nginx`.

server {
    listen 80;
    server_name api.zhaoplatforme.com;
    # Let certbot manage the HTTP->HTTPS redirect, or add it here.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.zhaoplatforme.com;

    # Managed by certbot:
    # ssl_certificate     /etc/letsencrypt/live/api.zhaoplatforme.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.zhaoplatforme.com/privkey.pem;

    # Uploads / large payloads (backend accepts up to 6mb JSON).
    client_max_body_size 12m;

    location /backend3/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
