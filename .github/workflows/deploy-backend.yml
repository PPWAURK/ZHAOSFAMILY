name: Deploy Backend

# Deploys the backend to the self-hosted server over SSH. The backend runs
# directly under PM2 (process "zhao-family-backend"), not in a container; MySQL
# and MinIO are pre-existing Docker containers the backend connects to via its
# server-side apps/backend/.env.production (gitignored, never overwritten here).
#
# The server holds a GitHub clone at ${{ secrets.DEPLOY_DIR }} (/opt/zhao-family).
# Trigger: push to main on backend-relevant paths, or manual dispatch.

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: SSH deploy (PM2)
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            export CI=true
            cd "${{ secrets.DEPLOY_DIR }}"
            # Force-align the working tree to origin/main (discards local drift;
            # the server's .env.production is gitignored and untouched).
            git fetch origin --prune
            git checkout -f -B main origin/main
            pnpm install --frozen-lockfile
            pnpm --filter backend build
            pm2 reload zhao-family-backend --update-env
            pm2 save
