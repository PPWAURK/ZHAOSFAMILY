# Production stack: backend (NestJS) + MySQL + MinIO on a single host.
# Usage on the server:
#   cd <deploy dir>
#   cp apps/backend/.env.production.example apps/backend/.env.production   # then fill it
#   cp .env.prod.example .env                                             # then fill it
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Only the backend is published to the host (127.0.0.1:3002); Nginx
# reverse-proxies it as https://api.zhaoplatforme.com/backend3 (see
# docs/deployment.md). MySQL and MinIO stay on the internal compose network.

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: zhao-backend:latest
    container_name: zhao-backend
    restart: unless-stopped
    env_file:
      - ./apps/backend/.env.production
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3002/'+(process.env.API_PREFIX||'api')+'/health').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  mysql:
    image: mysql:8.4
    container_name: zhao-mysql
    restart: unless-stopped
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zhao_family}
      MYSQL_USER: ${MYSQL_USER:-zhao}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
    volumes:
      - zhao_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${MYSQL_USER:-zhao}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:latest
    container_name: zhao-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - zhao_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  zhao_mysql_data:
  zhao_minio_data:
