<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #f6f4f2;
      --paper: #fbfaf8;
      --line: #e8d9d4;
      --line-strong: #d94a3a;
      --text: #1f1b1a;
      --muted: #857a76;
      --soft: #b5a7a1;
      --accent: #d83a2e;
      --accent-soft: #f7e5e2;
      --success: #2e7d61;
      --warning: #aa6d2f;
      --danger: #b9332e;
      --radius: 12px;
      --radius-sm: 10px;
      --shadow: 0 8px 20px rgba(112, 67, 52, 0.04);
      --container: 1560px;
      --sans: Inter, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      --serif: Georgia, "Times New Roman", "Songti SC", "STSong", serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      padding: 34px 48px 28px;
    }

    button, input, select { font: inherit; }

    .shell {
      max-width: var(--container);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(216, 58, 46, 0.55);
    }

    .topbar-left, .topbar-right {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }

    .menu-box {
      height: 30px;
      min-width: 68px;
      padding: 0 12px;
      border: 0;
      background: var(--accent);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.16em;
      cursor: pointer;
    }

    .menu-box:hover { opacity: 0.95; }

    .crumbs, .lang-strip, .micro {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--soft);
      white-space: nowrap;
    }

    .crumbs { overflow: hidden; text-overflow: ellipsis; }
    .crumbs strong, .lang-strip button.active { color: var(--text); }
    .lang-strip { display: flex; align-items: center; gap: 10px; }
    .lang-strip button {
      border: 0;
      background: transparent;
      color: var(--soft);
      padding: 0;
      cursor: pointer;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 11px;
    }
    .lang-strip button.active { color: var(--accent); }

    .hero {
      padding: 120px 0 44px;
      max-width: 980px;
      margin: 0 auto;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .hero-title {
      margin: 0;
      font-family: var(--serif);
      font-weight: 700;
      line-height: 0.98;
      font-size: clamp(42px, 7vw, 86px);
      letter-spacing: -0.03em;
    }

    .hero-title .accent {
      color: var(--accent);
      font-style: italic;
      margin-left: 10px;
    }

    .hero-subtitle {
      margin: 18px 0 0;
      font-size: 16px;
      color: var(--muted);
      line-height: 1.8;
      max-width: 760px;
    }

    .section-line {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 18px 0 20px;
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }
    .section-line::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.28);
      margin-bottom: 22px;
    }

    .stat {
      padding: 18px 18px 16px;
      border-right: 1px solid var(--line);
      min-height: 88px;
    }
    .stat:last-child { border-right: 0; }
    .stat .label {
      font-size: 11px;
      color: var(--soft);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .stat .value {
      font-family: var(--serif);
      font-size: clamp(24px, 4vw, 38px);
      color: var(--text);
    }

    .filters {
      display: grid;
      grid-template-columns: 1.4fr repeat(4, minmax(0, 1fr)) auto;
      gap: 14px;
      margin-bottom: 18px;
    }

    .field, .reset-btn {
      min-height: 52px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.45);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .field {
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
    }

    .field label {
      flex: 0 0 auto;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--soft);
    }

    .field input, .field select {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      min-width: 0;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 28px;
    }

    .tag-chip {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.5);
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .tag-chip.active {
      color: var(--accent);
      border-color: rgba(216, 58, 46, 0.45);
      background: var(--accent-soft);
    }

    .reset-btn {
      border-color: rgba(216, 58, 46, 0.28);
      color: var(--accent);
      padding: 0 18px;
      cursor: pointer;
      background: rgba(255,255,255,0.6);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 90px;
    }

    .column {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.34);
      padding: 0 0 14px;
      min-width: 0;
    }

    .column-head {
      padding: 18px 18px 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      position: relative;
    }

    .column-head::before {
      content: "";
      position: absolute;
      top: 0;
      left: 18px;
      width: 48px;
      height: 3px;
      background: var(--accent);
      border-radius: 999px;
    }

    .column-index {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .column-title {
      margin: 0;
      font-family: var(--serif);
      font-size: 30px;
      font-weight: 700;
      line-height: 1.08;
    }

    .column-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 13px;
    }

    .column-count {
      font-size: 12px;
      letter-spacing: 0.18em;
      color: var(--soft);
      text-transform: uppercase;
      white-space: nowrap;
      padding-top: 10px;
    }

    .card-list {
      display: grid;
      gap: 14px;
      padding: 14px 14px 0;
    }

    .news-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.5);
      padding: 16px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .news-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 42px;
      height: 3px;
      background: var(--accent);
    }

    .meta-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .meta-block {
      min-width: 0;
    }

    .mini {
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--soft);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .card-title {
      margin: 0;
      font-family: var(--serif);
      font-size: 27px;
      line-height: 1.05;
      font-weight: 700;
    }

    .author-line {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .vis {
      border: 1px solid currentColor;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .vis.public { color: var(--success); }
    .vis.team { color: var(--warning); }
    .vis.private { color: var(--danger); }

    .content {
      color: var(--text);
      opacity: 0.82;
      line-height: 1.8;
      font-size: 14px;
      margin: 0 0 14px;
    }

    .meta-grid {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 12px;
      color: var(--muted);
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .tag {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.68);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .attachment {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px dashed rgba(216, 58, 46, 0.35);
      background: rgba(247,229,226,0.45);
      color: var(--text);
      text-decoration: none;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      margin-bottom: 14px;
    }

    .attachment small { display: block; color: var(--muted); margin-top: 3px; }

    .actions {
      display: flex;
      justify-content: flex-end;
    }

    .delete-btn {
      border: 1px solid rgba(185, 51, 46, 0.28);
      background: transparent;
      color: var(--danger);
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      cursor: pointer;
    }

    .delete-btn:hover { background: rgba(216, 58, 46, 0.06); }

    .empty {
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 26px 18px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,0.32);
    }

    .footer {
      border-top: 1px solid var(--line);
      padding-top: 22px;
      text-align: center;
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    @media (max-width: 1280px) {
      .hero { max-width: 100%; padding-top: 88px; }
      .filters { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .board { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .board .column:last-child { grid-column: 1 / -1; }
      .stats-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 820px) {
      body { padding: 18px 16px 22px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .topbar-left, .topbar-right { width: 100%; justify-content: space-between; }
      .hero { padding-top: 52px; }
      .filters, .board, .stats-strip { grid-template-columns: 1fr; }
      .board .column:last-child { grid-column: auto; }
      .column-title, .card-title { font-size: 24px; }
      .hero-title { line-height: 1.05; }
    }
  </style>
</head>

      author: 'Chen Rui',
      tags: ['设备', 'IT', '门店'],
      visibility: 'team',
      attachment: { name: 'printer-checklist.pdf', size: '320 KB' }
    }
  ];

  const state = {
    lang: 'zh',
    search: '',
    month: 'all',
    sort: 'newest',
    visibility: 'all',
    author: 'all',
    activeTags: [],
    deletedIds: []
  };

  const app = document.getElementById('app');

  function t(key) { return translations[state.lang][key] || key; }
  const escapeHtml = (value) => String(value).replace(/[&<>\"']/g, (m) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
  const monthKey = (date) => date.slice(0, 7);
  const localeForSort = () => (state.lang === 'fr' ? 'fr' : 'zh-CN');

  function unique(arr) { return [...new Set(arr)]; }

  function getOptions() {
    const pool = mockItems.filter(item => !state.deletedIds.includes(item.id));
    return {
      months: unique(pool.map(item => monthKey(item.date))).sort((a, b) => b.localeCompare(a)),
      authors: unique(pool.map(item => item.author)).sort((a, b) => a.localeCompare(b, 'en')),
      tags: unique(pool.flatMap(item => item.tags)).sort((a, b) => a.localeCompare(b, localeForSort()))
    };
  }

  function itemText(item) {
    return [
      item.title.zh, item.title.fr,
      item.content.zh, item.content.fr,
      item.author,
      ...item.tags,
      item.visibility,
      item.date
    ].join(' ').toLowerCase();
  }

  function filterItems() {
    let items = mockItems.filter(item => !state.deletedIds.includes(item.id));
    if (state.month !== 'all') items = items.filter(item => monthKey(item.date) === state.month);
    if (state.visibility !== 'all') items = items.filter(item => item.visibility === state.visibility);
    if (state.author !== 'all') items = items.filter(item => item.author === state.author);
    if (state.activeTags.length) items = items.filter(item => state.activeTags.every(tag => item.tags.includes(tag)));
    if (state.search.trim()) {
      const q = state.search.trim().toLowerCase();
      items = items.filter(item => itemText(item).includes(q));
    }

    items = items.sort((a, b) => {
      switch (state.sort) {
        case 'oldest': return a.date.localeCompare(b.date);
        case 'titleAsc': return a.title[state.lang].localeCompare(b.title[state.lang], localeForSort());
        case 'authorAsc': return a.author.localeCompare(b.author, 'en');
        case 'newest':
        default: return b.date.localeCompare(a.date);
      }
    });

    return items;
  }

  function visibilityLabel(vis) {
    return t(vis);
  }

  function cardTemplate(item) {
    return `
        <article class="news-card">
          <div class="meta-top">
            <div class="meta-block">
              <div class="mini">${t('date')} · ${escapeHtml(item.date)}</div>
              <h4 class="card-title">${escapeHtml(item.title[state.lang])}</h4>
              <p class="author-line">${t('by')} · ${escapeHtml(item.author)}</p>
            </div>
            <span class="vis ${escapeHtml(item.visibility)}">${escapeHtml(visibilityLabel(item.visibility))}</span>
          </div>
          <p class="content">${escapeHtml(item.content[state.lang])}</p>
          <div class="meta-grid">
            <div>${t('attachment')} · ${escapeHtml(item.attachment.name)}</div>
          </div>
          <div class="tags">
            ${item.tags.map(tag => `<span class="tag">#${escapeHtml(tag)}</span>`).join('')}
          </div>
          <a href="#" class="attachment" onclick="event.preventDefault()">
            <div>
              <strong>${escapeHtml(item.attachment.name)}</strong>
              <small>${escapeHtml(item.attachment.size)}</small>
            </div>
            <span>→</span>
          </a>
          <div class="actions">
            <button class="delete-btn" onclick="removeItem(${item.id})">${t('delete')}</button>
          </div>
        </article>
      `;
  }

  function columnMeta() {
    return {
      news: { index: '01', title: t('news'), subtitle: t('columnSubNews') },
      congrats: { index: '02', title: t('congrats'), subtitle: t('columnSubCongrats') },
      issues: { index: '03', title: t('issues'), subtitle: t('columnSubIssues') }
    };
  }

  function columnTemplate(key, items) {
    const meta = columnMeta()[key];
    return `
        <section class="column">
          <div class="column-head">
            <div>
              <div class="column-index">${meta.index} · ${escapeHtml(meta.title)}</div>
              <h3 class="column-title">${escapeHtml(meta.title)}</h3>
              <p class="column-subtitle">${escapeHtml(meta.subtitle)}</p>
            </div>
            <div class="column-count">${items.length} ${t('cards')}</div>
          </div>
          <div class="card-list">
            ${items.length ? items.map(cardTemplate).join('') : `<div class="empty">${t('empty')}</div>`}
          </div>
        </section>
      `;
  }

  function resetFilters() {
    state.search = '';
    state.month = 'all';
    state.sort = 'newest';
    state.visibility = 'all';
    state.author = 'all';
    state.activeTags = [];
    render();
  }

  function toggleTag(tag) {
    state.activeTags = state.activeTags.includes(tag)
            ? state.activeTags.filter(current => current !== tag)
            : [...state.activeTags, tag];
    render();
  }

  function removeItem(id) {
    if (!state.deletedIds.includes(id)) state.deletedIds.push(id);
    render();
  }

  function setLang(lang) { state.lang = lang; render(); }

  function render() {
    const options = getOptions();
    const filtered = filterItems();
    const byColumn = {
      news: filtered.filter(item => item.column === 'news'),
      congrats: filtered.filter(item => item.column === 'congrats'),
      issues: filtered.filter(item => item.column === 'issues')
    };

    app.innerHTML = `
        <header class="topbar">
          <div class="topbar-left">
            <button class="menu-box">☰ ${t('menu')}</button>
            <div class="crumbs"><strong>${t('crumbBrand')}</strong> &nbsp;/&nbsp; ${t('crumbHome')} &nbsp;&nbsp; ${t('weekLabel')}</div>
          </div>
          <div class="topbar-right">
            <div class="lang-strip">
              <button class="${state.lang === 'zh' ? 'active' : ''}" onclick="setLang('zh')">ZH</button>
              <span>/</span>
              <button class="${state.lang === 'fr' ? 'active' : ''}" onclick="setLang('fr')">FR</button>
            </div>
          </div>
        </header>

        <section class="hero">
          <div class="eyebrow">● ${t('heroEyebrow')}</div>
          <h1 class="hero-title">${t('heroLeadA')} <span class="accent">${t('heroLeadB')}</span></h1>
          <p class="hero-subtitle">${t('heroSubtitle')}</p>
        </section>

        <div class="section-line">${t('sectionLabel')}</div>

        <section class="stats-strip">
          <div class="stat">
            <div class="label">${t('total')}</div>
            <div class="value">${filtered.length}</div>
          </div>
          <div class="stat">
            <div class="label">${t('news')}</div>
            <div class="value">${byColumn.news.length}</div>
          </div>
          <div class="stat">
            <div class="label">${t('congrats')}</div>
            <div class="value">${byColumn.congrats.length}</div>
          </div>
          <div class="stat">
            <div class="label">${t('issues')}</div>
            <div class="value">${byColumn.issues.length}</div>
          </div>
        </section>

        <section class="filters">
          <div class="field">
            <label>${t('search')}</label>
            <input value="${escapeHtml(state.search)}" placeholder="${escapeHtml(t('searchPlaceholder'))}" oninput="state.search=this.value;render()" />
          </div>
          <div class="field">
            <label>${t('month')}</label>
            <select onchange="state.month=this.value;render()">
              <option value="all" ${state.month === 'all' ? 'selected' : ''}>${t('all')}</option>
              ${options.months.map(month => `<option value="${month}" ${state.month === month ? 'selected' : ''}>${month}</option>`).join('')}
            </select>
          </div>
          <div class="field">
            <label>${t('sort')}</label>
            <select onchange="state.sort=this.value;render()">
              <option value="newest" ${state.sort === 'newest' ? 'selected' : ''}>${t('newest')}</option>
              <option value="oldest" ${state.sort === 'oldest' ? 'selected' : ''}>${t('oldest')}</option>
              <option value="titleAsc" ${state.sort === 'titleAsc' ? 'selected' : ''}>${t('titleAsc')}</option>
              <option value="authorAsc" ${state.sort === 'authorAsc' ? 'selected' : ''}>${t('authorAsc')}</option>
            </select>
          </div>
          <div class="field">
            <label>${t('visibility')}</label>
            <select onchange="state.visibility=this.value;render()">
              <option value="all" ${state.visibility === 'all' ? 'selected' : ''}>${t('all')}</option>
              <option value="public" ${state.visibility === 'public' ? 'selected' : ''}>${t('public')}</option>
              <option value="team" ${state.visibility === 'team' ? 'selected' : ''}>${t('team')}</option>
              <option value="private" ${state.visibility === 'private' ? 'selected' : ''}>${t('private')}</option>
            </select>
          </div>
          <div class="field">
            <label>${t('author')}</label>
            <select onchange="state.author=this.value;render()">
              <option value="all" ${state.author === 'all' ? 'selected' : ''}>${t('all')}</option>
              ${options.authors.map(author => `<option value="${escapeHtml(author)}" ${state.author === author ? 'selected' : ''}>${escapeHtml(author)}</option>`).join('')}
            </select>
          </div>
          <button class="reset-btn" onclick="resetFilters()">${t('reset')}</button>
        </section>

        <div class="micro" style="margin-bottom:12px;">${t('tagsLabel')}</div>
        <section class="tag-row">
          ${options.tags.map(tag => `<button class="tag-chip ${state.activeTags.includes(tag) ? 'active' : ''}" onclick="toggleTag('${String(tag).replace(/'/g, "\\'")}')">#${escapeHtml(tag)}</button>`).join('')}
        </section>

        <section class="board">
          ${columnTemplate('news', byColumn.news)}
          ${columnTemplate('congrats', byColumn.congrats)}
          ${columnTemplate('issues', byColumn.issues)}
        </section>

        <footer class="footer">${t('footer')}</footer>
      `;
  }

  render();
  window.state = state;
  window.render = render;
  window.resetFilters = resetFilters;
  window.toggleTag = toggleTag;
  window.removeItem = removeItem;
  window.setLang = setLang;
</script>
</body>
</html>
